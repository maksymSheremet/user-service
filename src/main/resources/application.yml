# ============================================================
# application.yml — базова конфігурація user-service
# ============================================================
server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/userdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration  # ← ВИПРАВЛЕНО: було 'migratio'

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "my.code.userservice.dto.event,my.code.auth.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: my.code.userservice.dto.event.UserRegisteredEvent
    listener:
      ack-mode: MANUAL_IMMEDIATE

  cloud:
    discovery:
      enabled: false

# ============================================================
# JWT — той самий secret що в auth-service
# auth-service JwtProperties: prefix="jwt", поле secret → jwt.secret
# user-service JwtProperties: prefix="jwt", поле secret → jwt.secret
# Однаковий ключ = можемо валідувати токени що auth-service видав
# ============================================================
jwt:
  secret: ${JWT_SECRET_KEY}

internal:
  api:
    key: ${INTERNAL_API_KEY}

kafka:
  topic:
    user-registered: user-registered-events
    user-registered-dlq: user-registered-events.DLT

logging:
  level:
    root: INFO
    my.code.userservice: INFO
    org.springframework.kafka: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
