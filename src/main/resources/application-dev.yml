# ============================================================
# application-dev.yml — dev профіль
# Активується через SPRING_PROFILES_ACTIVE=dev (.env)
# Перевизначає тільки те що відрізняється від application.yml
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/userdb
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    my.code.userservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.kafka: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always